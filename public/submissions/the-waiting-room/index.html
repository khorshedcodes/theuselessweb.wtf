<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Waiting Room</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <h1>Waiting Room</h1><div id="clock">12:00:00</div>
    <script>
        let time = new Date(); setInterval(() => { time = new Date(time.getTime() + 900); document.getElementById('clock').innerText = time.toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
