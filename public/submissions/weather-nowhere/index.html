<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Nowhere</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 24px; margin-bottom: 10px; opacity: 0.7; }
        .temp { font-size: 80px; font-weight: bold; }
        .desc { font-size: 24px; color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Current Weather in <strong>The Void</strong></h1>
        <div class="temp">-273°C</div>
        <div class="desc">Existentially Sunny</div>
        <p style="margin-top: 20px; font-size: 14px;">Humidity: 0%<br>Wind: N/A</p>
    </div>
</body>
</html>
