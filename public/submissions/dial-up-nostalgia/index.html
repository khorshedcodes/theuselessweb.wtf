<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dial-up Nostalgia</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <button id="btn">CONNECT</button>
    <script>
        const ctx = new AudioContext(); document.getElementById('btn').onclick = () => { const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.frequency.setValueAtTime(100, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 5); osc.start(); osc.stop(ctx.currentTime + 5); };
    </script>
</body>
</html>
