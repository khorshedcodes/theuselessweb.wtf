<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paperclip Simulator</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <div id="clip" style="width:200px; height:100px; border:4px solid #999; border-radius:50px; position:relative; cursor:pointer;"></div><p id="msg">Bend it!</p>
    <script>
        let bends = 0; const clip = document.getElementById('clip'); clip.onclick = () => { bends++; clip.style.transform = 'skew(' + (bends*5) + 'deg)'; if(bends > 10) { clip.style.borderColor = 'transparent'; document.getElementById('msg').innerText = "SNAP! Here's a new one."; setTimeout(() => { bends = 0; clip.style.transform = ''; clip.style.borderColor = '#999'; document.getElementById('msg').innerText = 'Bend it!'; }, 1000); } };
    </script>
</body>
</html>
