<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silent Piano</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <div id="keys" style="display:flex; gap:5px;"></div>
    <script>
        const keys = document.getElementById('keys'); for(let i=0; i<12; i++) { const k = document.createElement('div'); k.style.width = '40px'; k.style.height = '150px'; k.style.background = 'hsl(' + (Math.random()*360) + ', 70%, 50%)'; k.style.border = '1px solid #000'; k.style.cursor = 'pointer'; k.onclick = () => { k.style.opacity = 0.5; setTimeout(()=>k.style.opacity=1, 100); }; keys.appendChild(k); }
    </script>
</body>
</html>
