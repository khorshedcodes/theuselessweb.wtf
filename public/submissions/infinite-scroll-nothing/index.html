<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Scroll Nothing</title>
    <style>
        body {
            margin: 0;
            background: #ecf0f1;
            min-height: 200vh;
        }
        .line {
            position: absolute;
            height: 2px;
            background: #bdc3c7;
            width: 50px;
        }
    </style>
</head>
<body>
    <script>
        function createLine() {
            const line = document.createElement('div');
            line.className = 'line';
            line.style.top = (window.scrollY + window.innerHeight + Math.random() * 500) + 'px';
            line.style.left = Math.random() * 100 + 'vw';
            line.style.width = (20 + Math.random() * 100) + 'px';
            document.body.appendChild(line);
        }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                document.body.style.height = (document.body.offsetHeight + 1000) + 'px';
                for(let i=0; i<20; i++) createLine();
            }
        };

        // Initial lines
        for(let i=0; i<50; i++) {
            const line = document.createElement('div');
            line.className = 'line';
            line.style.top = Math.random() * 200 + 'vh';
            line.style.left = Math.random() * 100 + 'vw';
            line.style.width = (20 + Math.random() * 100) + 'px';
            document.body.appendChild(line);
        }
    </script>
</body>
</html>
