<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Shaper</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <div id="cloud" style="font-size:150px; cursor:pointer;">☁️</div>
    <script>
        const animals = ['🐘', '🦒', '🐈', '🐕', '🦖', '🐋', '🦆']; document.getElementById('cloud').onclick = (e) => { e.target.innerText = animals[Math.floor(Math.random()*animals.length)]; setTimeout(() => e.target.innerText = '☁️', 2000); };
    </script>
</body>
</html>
