<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melting Clock</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }#clock { transition: transform 60s linear; }
    </style>
</head>
<body>
    <div id="clock" style="font-size:100px;">12:00:00</div>
    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); document.getElementById('clock').style.transform = 'scaleY(2) translateY(100px)'; }, 1000);
    </script>
</body>
</html>
