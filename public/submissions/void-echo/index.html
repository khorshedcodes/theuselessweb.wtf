<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Echo</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <input id="in" placeholder="Type something..."><div id="echo"></div>
    <script>
        document.getElementById('in').onchange = (e) => { const val = e.target.value; const echo = document.getElementById('echo'); for(let i=0; i<10; i++) { const d = document.createElement('div'); d.innerText = val; d.style.fontSize = (20 - i*2) + 'px'; d.style.opacity = 1 - i*0.1; echo.appendChild(d); } };
    </script>
</body>
</html>
