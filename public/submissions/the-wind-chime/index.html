<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wind Chime</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <div id="chimes" style="display:flex; gap:20px;"></div>
    <script>
        for(let i=0; i<5; i++) { const d = document.createElement('div'); d.style.width = '10px'; d.style.height = (100 + i*20) + 'px'; d.style.background = '#ccc'; d.style.transition = 'transform 0.5s'; document.getElementById('chimes').appendChild(d); d.onmouseover = () => { d.style.transform = 'rotate(20deg)'; setTimeout(()=>d.style.transform='rotate(-20deg)', 500); setTimeout(()=>d.style.transform='', 1000); }; }
    </script>
</body>
</html>
