<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pop</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }.bubble { position: absolute; border-radius: 50%; background: rgba(0, 150, 255, 0.6); cursor: pointer; transition: transform 0.1s; } .pixel { position: absolute; width: 4px; height: 4px; background: rgba(0, 150, 255, 0.8); }
    </style>
</head>
<body>
    <h1>Pixel Pop</h1>
    <script>
        function createBubble() { const b = document.createElement('div'); b.className = 'bubble'; const size = Math.random() * 50 + 30; b.style.width = size + 'px'; b.style.height = size + 'px'; b.style.left = Math.random() * (window.innerWidth - size) + 'px'; b.style.top = Math.random() * (window.innerHeight - size) + 'px'; b.onclick = (e) => { for(let i=0; i<20; i++) { const p = document.createElement('div'); p.className = 'pixel'; p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px'; document.body.appendChild(p); const vx = (Math.random() - 0.5) * 10; const vy = (Math.random() - 0.5) * 10; let x = e.clientX, y = e.clientY; const anim = setInterval(() => { x += vx; y += vy; p.style.left = x + 'px'; p.style.top = y + 'px'; p.style.opacity = parseFloat(p.style.opacity || 1) - 0.05; if(p.style.opacity <= 0) { clearInterval(anim); p.remove(); } }, 20); } b.remove(); createBubble(); }; document.body.appendChild(b); } for(let i=0; i<10; i++) createBubble();
    </script>
</body>
</html>
