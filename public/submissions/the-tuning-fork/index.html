<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tuning Fork</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <div id="fork" style="font-size:100px; cursor:pointer;">🍴</div>
    <script>
        const ctx = new AudioContext(); document.getElementById('fork').onclick = () => { const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.frequency.value = 440; osc.start(); osc.stop(ctx.currentTime + 2); };
    </script>
</body>
</html>
