<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Elevator</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <div id="panel"><input type="number" id="floor" value="1" min="1" max="1000000"><button id="go">GO</button></div><div id="doors" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#888; z-index:100; display:flex;"><div id="left" style="width:50%; height:100%; background:#777; border-right:2px solid #555;"></div><div id="right" style="width:50%; height:100%; background:#777;"></div></div>
    <script>
        const go = document.getElementById('go'); const doors = document.getElementById('doors'); const left = document.getElementById('left'); const right = document.getElementById('right'); go.onclick = () => { doors.style.display = 'flex'; left.style.transform = 'translateX(0)'; right.style.transform = 'translateX(0)'; setTimeout(() => { document.body.style.background = 'rgb(' + (120+Math.random()*40) + ',' + (120+Math.random()*40) + ',' + (120+Math.random()*40) + ')'; left.style.transition = 'transform 1s'; right.style.transition = 'transform 1s'; left.style.transform = 'translateX(-100%)'; right.style.transform = 'translateX(100%)'; setTimeout(() => { doors.style.display = 'none'; left.style.transition = ''; right.style.transition = ''; }, 1000); }, 3000); };
    </script>
</body>
</html>
