<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mirror</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <video id="v" autoplay></video><div id="nose" style="position:fixed; display:none; font-size:50px;">🔴</div>
    <script>
        navigator.mediaDevices.getUserMedia({video:true}).then(s => { document.getElementById('v').srcObject = s; }); setInterval(() => { const n = document.getElementById('nose'); n.style.display = 'block'; n.style.left = Math.random()*window.innerWidth + 'px'; n.style.top = Math.random()*window.innerHeight + 'px'; }, 10000);
    </script>
</body>
</html>
