<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meaning of Life Button</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <button id="btn" style="width:200px; height:200px; border-radius:50%;">THE MEANING OF LIFE</button><div id="res"></div>
    <script>
        document.getElementById('btn').onclick = () => { navigator.getBattery().then(b => { document.getElementById('res').innerText = "The meaning of life is " + (b.level * 100) + "% battery."; }); };
    </script>
</body>
</html>
