<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Echo Chamber</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <input id="in"><div id="chamber"></div>
    <script>
        document.getElementById('in').oninput = (e) => { const chamber = document.getElementById('chamber'); chamber.innerHTML = ''; for(let i=0; i<20; i++) { const d = document.createElement('div'); d.innerText = e.target.value; d.style.fontFamily = ['serif', 'sans-serif', 'monospace', 'cursive'][i%4]; chamber.appendChild(d); } };
    </script>
</body>
</html>
