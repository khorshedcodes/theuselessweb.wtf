<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is It Weekend?</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <h1 id="res"></h1>
    <script>
        const day = new Date().getDay(); document.getElementById('res').innerText = (day === 0 || day === 6) ? 'YES' : 'NO';
    </script>
</body>
</html>
