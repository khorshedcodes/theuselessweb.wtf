<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password God</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <input type="password" id="pw" placeholder="Enter password"><p id="feedback" style="color:red; margin-top:10px;"></p>
    <script>
        const reasons = [ "Password must contain a hieroglyph.", "Password must be a prime number.", "Password must contain the current temperature in Oymyakon.", "Password must be at least 100 characters long.", "Password must contain a secret.", "Password must be written in Comic Sans.", "Password must contain an emoji of a fruit that isn't red.", "Password must rhyme with 'orange'.", "Password must contain a valid credit card number.", "Password must be offensive to ghosts." ]; let idx = 0; document.getElementById('pw').oninput = () => { document.getElementById('feedback').innerText = reasons[idx % reasons.length]; idx++; };
    </script>
</body>
</html>
