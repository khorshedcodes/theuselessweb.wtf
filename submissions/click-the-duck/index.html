<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click the Duck</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #87CEEB; font-family: sans-serif; overflow: hidden; cursor: crosshair; }
        #duck { font-size: 100px; user-select: none; transition: transform 0.1s; cursor: pointer; }
        #duck:active { transform: scale(1.2); }
        #score { position: absolute; top: 20px; font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="score">Ducks Clicked: 0</div>
    <div id="duck">🦆</div>
    <script>
        let count = 0;
        const duck = document.getElementById('duck');
        const score = document.getElementById('score');
        duck.addEventListener('click', () => {
            count++;
            score.textContent = `Ducks Clicked: ${count}`;
            duck.style.position = 'absolute';
            duck.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            duck.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        });
    </script>
</body>
</html>
