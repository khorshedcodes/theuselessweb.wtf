<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static TV</title>
    <style>
        body { margin:0; } #c { position:fixed; top:0; left:0; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const c = document.getElementById('c'); const ctx = c.getContext('2d'); c.width = window.innerWidth; c.height = window.innerHeight; function drawStatic() { const img = ctx.createImageData(c.width, c.height); for(let i=0; i<img.data.length; i+=4) { const v = Math.random()*255; img.data[i] = img.data[i+1] = img.data[i+2] = v; img.data[i+3] = 255; } ctx.putImageData(img, 0, 0); requestAnimationFrame(drawStatic); } drawStatic(); window.onmousemove = (e) => { ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(e.clientX, e.clientY, 50, 0, Math.PI*2); ctx.fill(); ctx.globalCompositeOperation = 'source-over'; };
    </script>
</body>
</html>
