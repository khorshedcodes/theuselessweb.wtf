<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Dot</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; }
        #dot {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ff4757;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="dot"></div>
    <script>
        const dot = document.getElementById('dot');
        let y = 0;
        let vy = 0;
        const g = 0.5;
        const bounce = -15;

        dot.style.left = (window.innerWidth / 2 - 25) + 'px';

        function update() {
            vy += g;
            y += vy;
            if (y > window.innerHeight - 50) {
                y = window.innerHeight - 50;
                vy *= -0.5;
            }
            dot.style.top = y + 'px';
            requestAnimationFrame(update);
        }

        dot.addEventListener('mousedown', () => {
            vy = bounce;
        });

        update();
    </script>
</body>
</html>
