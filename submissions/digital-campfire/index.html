<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Campfire</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <div style="font-size:100px;">🔥</div><p>Drag emojis here (not really, just click them)</p><div id="emojis">😀 🍕 🚗 🐱</div>
    <script>
        document.getElementById('emojis').onclick = (e) => { if(e.target.innerText.length > 2) return; const ash = document.createElement('div'); ash.innerText = '💨'; ash.style.position = 'fixed'; ash.style.left = e.clientX + 'px'; ash.style.top = e.clientY + 'px'; document.body.appendChild(ash); setTimeout(() => ash.remove(), 1000); };
    </script>
</body>
</html>
