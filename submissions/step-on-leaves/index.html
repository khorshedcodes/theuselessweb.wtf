<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step on Leaves</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <p>Walk around...</p>
    <script>
        const ctx = new AudioContext(); window.onmousemove = () => { if(Math.random() > 0.9) { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = Math.random()*1000; gain.gain.setValueAtTime(0.01, ctx.currentTime); osc.start(); osc.stop(ctx.currentTime + 0.1); } };
    </script>
</body>
</html>
