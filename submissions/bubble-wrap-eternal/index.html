<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Wrap Eternal</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }.wrap { display: grid; grid-template-columns: repeat(20, 1fr); gap: 5px; padding: 20px; } .bubble { width: 30px; height: 30px; background: #add8e6; border-radius: 50%; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2); cursor: pointer; } .bubble.popped { background: #d3d3d3; box-shadow: none; }
    </style>
</head>
<body>
    <h1>Bubble Wrap Eternal</h1>
    <script>
        const container = document.createElement('div'); container.className = 'wrap'; document.body.appendChild(container); const ctx = new AudioContext(); function popSound() { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.setValueAtTime(150 + Math.random()*100, ctx.currentTime); gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.start(); osc.stop(ctx.currentTime + 0.1); } function addBubbles() { for(let i=0; i<100; i++) { const b = document.createElement('div'); b.className = 'bubble'; b.onclick = () => { if(!b.classList.contains('popped')) { b.classList.add('popped'); popSound(); } }; container.appendChild(b); } } addBubbles(); window.onscroll = () => { if(window.innerHeight + window.scrollY >= document.body.offsetHeight) addBubbles(); };
    </script>
</body>
</html>
