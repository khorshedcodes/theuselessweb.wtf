<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Escape</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }body { cursor: none; }
    </style>
</head>
<body>
    <div id="cursor" style="position:fixed; font-size:30px;">🏃</div>
    <script>
        const c = document.getElementById('cursor'); window.onmousemove = (e) => { c.style.left = (e.clientX + 50) + 'px'; c.style.top = (e.clientY + 50) + 'px'; };
    </script>
</body>
</html>
