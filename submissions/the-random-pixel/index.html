<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Random Pixel</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <div id="pixel" style="width:1px; height:1px; background:red; position:absolute;"></div>
    <script>
        const p = document.getElementById('pixel'); p.style.left = Math.random()*window.innerWidth + 'px'; p.style.top = Math.random()*window.innerHeight + 'px'; p.onclick = () => alert('You found it!');
    </script>
</body>
</html>
