<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Un-Calculator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .calculator {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 320px;
            position: relative;
        }

        .display {
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            font-size: 32px;
            font-family: monospace;
            margin-bottom: 20px;
            border: 1px solid #334155;
            min-height: 40px;
            color: #10b981;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            position: relative;
            height: 300px;
        }

        .btn {
            background: #334155;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease-out, background 0.2s;
            position: absolute;
            width: 65px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .btn:hover {
            background: #475569;
        }

        .btn-op {
            background: #4f46e5;
        }

        .btn-eq {
            background: #10b981;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="grid" id="grid">
            <!-- Buttons will be generated by JS -->
        </div>
        <div class="status">Click a button to calculate... if you can.</div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const display = document.getElementById('display');
        const buttons = [
            '7', '8', '9', '/',
            '4', '5', '6', '*',
            '1', '2', '3', '-',
            'C', '0', '=', '+'
        ];

        const btnElements = [];

        buttons.forEach((label, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            if (['/', '*', '-', '+'].includes(label)) btn.classList.add('btn-op');
            if (label === '=') btn.classList.add('btn-eq');
            btn.innerText = label;
            
            // Set initial positions
            const col = i % 4;
            const row = Math.floor(i / 4);
            const x = col * 75;
            const y = row * 70;
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.dataset.homeX = x;
            btn.dataset.homeY = y;
            
            btn.addEventListener('mouseenter', () => runaway(btn));
            btn.addEventListener('click', () => {
                if (label === 'C') display.innerText = '0';
                else if (label === '=') display.innerText = 'Error: Catch me first';
                else {
                    if (display.innerText === '0') display.innerText = label;
                    else display.innerText += label;
                }
            });

            grid.appendChild(btn);
            btnElements.push(btn);
        });

        function runaway(btn) {
            const rect = btn.getBoundingClientRect();
            const gridRect = grid.getBoundingClientRect();
            
            // Random direction
            const angle = Math.random() * Math.PI * 2;
            const dist = 100;
            
            let newX = parseFloat(btn.style.left) + Math.cos(angle) * dist;
            let newY = parseFloat(btn.style.top) + Math.sin(angle) * dist;
            
            // Keep within bounds
            newX = Math.max(-20, Math.min(gridRect.width - 45, newX));
            newY = Math.max(-20, Math.min(gridRect.height - 40, newY));
            
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
            btn.style.background = '#ef4444';
            
            setTimeout(() => {
                btn.style.background = btn.classList.contains('btn-op') ? '#4f46e5' : 
                                      btn.classList.contains('btn-eq') ? '#10b981' : '#334155';
            }, 500);
        }

        // Occasionally return home
        setInterval(() => {
            btnElements.forEach(btn => {
                if (Math.random() < 0.1) {
                    btn.style.left = btn.dataset.homeX + 'px';
                    btn.style.top = btn.dataset.homeY + 'px';
                }
            });
        }, 3000);
    </script>
</body>
</html>
