<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Infinite Yes</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <h1 id="yes">YES</h1>
    <script>
        setInterval(() => { const y = document.getElementById('yes'); y.style.fontFamily = ['serif', 'sans-serif', 'monospace', 'cursive'][Math.floor(Math.random()*4)]; y.style.color = 'hsl(' + (Math.random()*360) + ', 70%, 50%)'; }, 1000);
    </script>
</body>
</html>
