<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Applause</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; background: #f0f0f0; overflow: hidden; } h1 { color: #333; pointer-events: none; }
    </style>
</head>
<body>
    <button id="btn">Applaud Me</button>
    <script>
        const ctx = new AudioContext(); document.getElementById('btn').onclick = () => { for(let i=0; i<10; i++) { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = 500 + Math.random()*1000; gain.gain.setValueAtTime(0.01, ctx.currentTime + Math.random()*3); osc.start(); osc.stop(ctx.currentTime + 3); } };
    </script>
</body>
</html>
